# Quick CPU training config — completes in ~5-10 minutes
# Produces a real checkpoint usable by demos and notebooks

model:
  vocab_size: 256         # byte-level / char-level vocabulary
  d_model: 128
  n_heads: 4
  n_layers: 4
  d_ff: 512
  max_seq_len: 128
  dropout: 0.1
  layer_norm_eps: 1.0e-6
  tie_weights: true

training:
  batch_size: 16
  learning_rate: 3.0e-4
  weight_decay: 0.01
  warmup_steps: 50
  max_steps: 2000
  gradient_clip: 1.0
  log_interval: 50
  eval_interval: 200
  save_interval: 500

data:
  seq_length: 128
  train_split: 0.9
  num_workers: 0
  pin_memory: false
